<script>
const SUPABASE_URL='https://susqggsvnuipdzcpalvo.supabase.co';
const SUPABASE_KEY='TU_API_KEY_AQUI'; // ⚠️ CAMBIA ESTO

const PK='hq_pwd';
const getPwd=()=>localStorage.getItem(PK)||'housequeen2025';

const sbFetch=async(path,opts={})=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json',
      'Prefer':opts.prefer||'return=representation',
      ...opts.headers
    }
  });
  if(!res.ok) throw new Error(await res.text());
  const txt=await res.text();
  return txt?JSON.parse(txt):[];
};

const uploadFile=async(file,bucket)=>{
  const ext=file.name.split('.').pop();
  const name=`${Date.now()}_${Math.random().toString(36).substr(2,5)}.${ext}`;

  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${name}`,{
    method:'POST',
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':file.type,
      'x-upsert':'true'
    },
    body:file
  });

  if(!res.ok) throw new Error('Error subiendo archivo');

  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${name}`;
};

let allProducts=[];

/* =========================
   LOGO DESDE PRODUCTS
========================= */
async function loadLogo(){
  try{
    const rows=await sbFetch("products?name=eq.__LOGO__&select=image_url",{prefer:''});
    if(rows.length && rows[0].image_url){
      applyLogo(rows[0].image_url);
      return;
    }
  }catch(e){}

  const local=localStorage.getItem('hq_logo');
  if(local) applyLogo(local);
}

function applyLogo(url){
  const navPh=document.getElementById('navLogoPlaceholder');
  if(navPh){
    navPh.outerHTML=`<img class="nav-logo-img" src="${url}">`;
  }

  const heroPh=document.getElementById('heroLogoPlaceholder');
  if(heroPh){
    heroPh.outerHTML=`<img class="hero-logo-big" src="${url}">`;
  }
}

/* =========================
   GUARDAR LOGO EN PRODUCTS
========================= */
let selectedLogoFile=null;

function handleLogoSelect(input){
  selectedLogoFile=input.files[0];
}

async function saveLogo(){
  if(!selectedLogoFile){
    alert("Selecciona imagen");
    return;
  }

  try{
    const url=await uploadFile(selectedLogoFile,'productos');

    const existing=await sbFetch("products?name=eq.__LOGO__&select=id",{prefer:''});

    if(existing.length){
      await sbFetch(`products?id=eq.${existing[0].id}`,{
        method:'PATCH',
        body:JSON.stringify({image_url:url}),
        prefer:'return=minimal'
      });
    }else{
      await sbFetch('products',{
        method:'POST',
        body:JSON.stringify({
          name:'__LOGO__',
          category:'config',
          image_url:url
        })
      });
    }

    localStorage.setItem('hq_logo',url);
    applyLogo(url);

    alert("Logo guardado");

  }catch(e){
    console.error(e);
    alert("Error guardando logo");
  }
}

/* =========================
   PRODUCTOS
========================= */
async function loadProducts(){
  const data=await sbFetch('products?select=*&order=created_at.desc',{prefer:''});

  // 🔥 FILTRA LOGO
  allProducts=data.filter(p=>p.name!=='__LOGO__');

  renderProducts();
}

function renderProducts(){
  const grid=document.getElementById('productsGrid');

  if(!allProducts.length){
    grid.innerHTML="Sin productos";
    return;
  }

  grid.innerHTML=allProducts.map(p=>`
    <div>
      <img src="${p.image_url||''}" width="100%">
      <h3>${p.name}</h3>
      <p>${p.price||''}</p>
    </div>
  `).join('');
}

/* =========================
   INIT
========================= */
loadLogo();
loadProducts();
</script>
