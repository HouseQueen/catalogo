<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Queen — Catálogo de Productos</title>
<meta name="description" content="Comercializadora House Queen - Catálogo de lencería para el hogar. Sábanas, toallas, cobijas, cortinas y más. Bogotá, Colombia.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8912A;--gold-light:#D4AE5A;--gold-pale:#F5EDD6;--gold-border:#E8D49A;
  --dark:#1A1208;--text:#2A2018;--muted:#7A6E5E;--light:#F9F6F0;
  --white:#FFFFFF;--border:#E8E2D8;--border2:#D4C9B0;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);font-size:15px;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f0ebe0}::-webkit-scrollbar-thumb{background:var(--gold-light);border-radius:3px}
.topbar{background:var(--dark);color:#C9A84C;text-align:center;padding:7px 20px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:14px 5%;gap:20px}
.nav-logo{text-decoration:none;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-logo-img{width:52px;height:52px;object-fit:contain;border-radius:50%}
.nav-logo-ph{width:52px;height:52px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo-ph svg{width:28px;height:28px;fill:#C9A84C}
.nav-logo-text{display:flex;flex-direction:column;line-height:1}
.nav-logo-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--dark);letter-spacing:0.04em}
.nav-logo-sub{font-size:9px;color:var(--gold);letter-spacing:0.25em;text-transform:uppercase;margin-top:2px;font-weight:500}
.nav-search{flex:1;max-width:420px;display:flex;align-items:center;border:1px solid var(--border2);border-radius:2px;overflow:hidden}
.nav-search input{flex:1;border:none;outline:none;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--white)}
.nav-search input::placeholder{color:var(--muted)}
.nav-search button{background:var(--dark);border:none;padding:9px 16px;cursor:pointer;color:#C9A84C}
.nav-actions{display:flex;align-items:center;gap:12px;flex-shrink:0}
.btn-admin-top{background:transparent;border:1px solid var(--gold-border);color:var(--gold);padding:7px 18px;border-radius:2px;cursor:pointer;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s}
.btn-admin-top:hover{background:var(--gold);color:var(--white)}
.nav-wa{display:flex;align-items:center;gap:6px;background:#25D366;color:white;border:none;padding:7px 14px;border-radius:2px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:500;text-decoration:none}
.cat-menu{border-top:1px solid var(--border);padding:0 5%;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none}
.cat-menu::-webkit-scrollbar{display:none}
.cat-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:12px 18px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;transition:all 0.2s}
.cat-btn:hover{color:var(--text)}.cat-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.hero{background:var(--light);padding:60px 5%;display:flex;align-items:center;gap:60px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-60px;top:-60px;width:400px;height:400px;border-radius:50%;border:1px solid var(--gold-border);opacity:0.3}
.hero::after{content:'';position:absolute;right:-20px;top:-20px;width:280px;height:280px;border-radius:50%;border:1px solid var(--gold-border);opacity:0.2}
.hero-left{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:1;flex-shrink:0}
.hero-logo-big{width:140px;height:140px;object-fit:contain;border-radius:50%}
.hero-logo-big-ph{width:140px;height:140px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center}
.hero-logo-big-ph svg{width:70px;height:70px;fill:#C9A84C}
.hero-text{max-width:520px;z-index:1}
.hero-badge{display:inline-block;border:1px solid var(--gold-border);color:var(--gold);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:20px;background:var(--gold-pale)}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,4.5vw,58px);font-weight:500;line-height:1.1;margin-bottom:16px;color:var(--dark)}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{color:var(--muted);font-size:15px;line-height:1.8;margin-bottom:28px;max-width:440px}
.hero-div{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.hero-div-line{width:40px;height:1px;background:var(--gold-border)}
.hero-div-txt{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold)}
.btn-hero{display:inline-block;background:var(--dark);color:var(--white);text-decoration:none;padding:13px 36px;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;border-radius:2px;transition:background 0.2s;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-hero:hover{background:var(--gold)}
.catalog-section{padding:48px 5%}
.catalog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.catalog-header-left h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--dark)}
.catalog-header-left p{font-size:13px;color:var(--muted);margin-top:2px}
.catalog-controls{display:flex;align-items:center;gap:10px}
.sort-select{border:1px solid var(--border2);border-radius:2px;padding:7px 12px;font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;outline:none;background:var(--white);cursor:pointer}
.view-btns{display:flex;border:1px solid var(--border2);border-radius:2px;overflow:hidden}
.view-btn{background:var(--white);border:none;padding:7px 10px;cursor:pointer;color:var(--muted);font-size:13px;transition:all 0.2s}
.view-btn.active{background:var(--dark);color:var(--white)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.products-grid.list-view{grid-template-columns:1fr}
.product-card{background:var(--white);transition:all 0.25s;position:relative}
.product-card:hover{z-index:2;box-shadow:0 8px 32px rgba(184,145,42,0.12)}
.product-card:hover .product-overlay{opacity:1}
.product-image-wrap{position:relative;overflow:hidden;aspect-ratio:1/1;background:var(--light)}
.products-grid.list-view .product-image-wrap{aspect-ratio:unset;width:200px;flex-shrink:0}
.products-grid.list-view .product-card{display:flex}
.product-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s}
.product-card:hover .product-img{transform:scale(1.04)}
.product-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--light)}
.product-placeholder svg{width:40px;height:40px;opacity:0.2}
.product-placeholder span{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.product-badge{position:absolute;top:12px;left:12px;background:var(--dark);color:#C9A84C;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:4px 10px;border-radius:1px}
.badge-agotado{background:#E0E0E0;color:#888}.badge-pedido{background:var(--gold-pale);color:var(--gold)}
.product-overlay{position:absolute;inset:0;background:rgba(26,18,8,0.04);display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px;opacity:0;transition:opacity 0.25s}
.product-wa-btn{display:flex;align-items:center;gap:6px;background:#25D366;color:white;border:none;padding:9px 20px;border-radius:2px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer}
.product-info{padding:16px}
.products-grid.list-view .product-info{flex:1;padding:20px}
.product-cat{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:block}
.product-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--dark);margin-bottom:6px;line-height:1.2}
.product-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px}
.product-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold)}
.product-status{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:10px}
.status-Disponible{background:#E8F5E9;color:#2E7D32}
.status-Bajo-pedido{background:var(--gold-pale);color:var(--gold)}
.status-Agotado{background:#F5F5F5;color:#9E9E9E}
.skeleton{background:linear-gradient(90deg,var(--light) 25%,var(--border) 50%,var(--light) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{background:var(--white)}
.skeleton-img{aspect-ratio:1/1;width:100%}
.skeleton-line{height:12px;border-radius:2px;margin:8px 16px}
.skeleton-line.short{width:40%;margin-top:4px}
.empty-state{text-align:center;padding:80px 20px;background:var(--white);grid-column:1/-1}
.empty-state svg{opacity:0.15;margin:0 auto 16px;display:block}
.empty-state strong{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:20px;display:block;margin-bottom:8px}
.empty-state p{color:var(--muted);font-size:14px}
.contact-bar{background:var(--dark);color:var(--white);padding:48px 5%;text-align:center}
.contact-bar h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:500;color:#C9A84C;margin-bottom:8px}
.contact-bar p{color:#8A7A58;font-size:14px;margin-bottom:32px}
.contact-items{display:flex;gap:40px;justify-content:center;flex-wrap:wrap}
.contact-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.contact-icon{width:44px;height:44px;border-radius:50%;border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center}
.contact-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#8A7A58}
.contact-val{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--white)}
.contact-val a{color:#C9A84C;text-decoration:none}
footer{background:#111008;padding:24px 5%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
footer p{font-size:11px;color:#5A5040}
footer strong{color:#C9A84C;font-family:'Cormorant Garamond',serif}
.toast{position:fixed;bottom:28px;right:28px;z-index:2000;background:var(--dark);border:1px solid var(--gold-border);color:var(--white);padding:12px 20px;border-radius:3px;font-size:13px;transform:translateY(60px);opacity:0;transition:all 0.3s;pointer-events:none;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.pwd-overlay{display:none;position:fixed;inset:0;z-index:900;background:rgba(10,7,2,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.pwd-overlay.open{display:flex}
.pwd-box{background:var(--white);border:1px solid var(--border2);border-radius:4px;padding:40px;text-align:center;max-width:340px;width:100%}
.pwd-box h2{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--dark);margin-bottom:6px}
.pwd-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.pwd-box input{width:100%;border:1px solid var(--border2);color:var(--text);padding:10px 14px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:16px;background:var(--light)}
.pwd-box input:focus{border-color:var(--gold)}
.pwd-error{color:#C62828;font-size:12px;margin-top:-10px;margin-bottom:12px;display:none}
.btn-gold{background:var(--dark);color:var(--white);border:none;padding:11px 28px;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background 0.2s;width:100%}
.btn-gold:hover{background:var(--gold)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:10px 24px;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;margin-top:8px;transition:all 0.2s}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.admin-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,7,2,0.7);backdrop-filter:blur(4px);overflow-y:auto;padding:32px 16px}
.admin-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.admin-panel{background:var(--white);border:1px solid var(--border2);border-radius:4px;width:100%;max-width:700px;padding:36px;position:relative}
.admin-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:2px}
.admin-close:hover{color:var(--text)}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--dark);margin-bottom:4px}
.admin-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.admin-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap}
.admin-tab{background:transparent;border:none;color:var(--muted);padding:10px 16px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;letter-spacing:0.05em}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-section{display:none}.admin-section.active{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}.form-group.full{grid-column:1/-1}
.form-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);font-weight:500}
.form-input,.form-select,.form-textarea{border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;background:var(--light)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);background:var(--white)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted);opacity:0.6}
.img-drop{border:1.5px dashed var(--border2);border-radius:2px;background:var(--light);padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;position:relative;overflow:hidden;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-drop:hover{border-color:var(--gold)}
.img-drop svg{width:24px;height:24px;stroke:var(--muted);fill:none;margin-bottom:6px;opacity:0.5}
.img-drop p{font-size:12px;color:var(--muted)}
.logo-drop{border:1.5px dashed var(--gold-border);border-radius:50%;width:140px;height:140px;margin:0 auto;cursor:pointer;transition:border-color 0.2s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--light)}
.logo-drop:hover{border-color:var(--gold);background:var(--gold-pale)}
.logo-drop svg{width:28px;height:28px;stroke:var(--muted);fill:none;opacity:0.4}
.logo-drop p{font-size:10px;color:var(--muted);text-align:center;margin-top:4px}
.logo-drop-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.logo-drop-wrap span{font-size:12px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6}
.logo-status{font-size:12px;padding:8px 16px;border-radius:2px;text-align:center}
.logo-status.ok{background:#E8F5E9;color:#2E7D32}
.logo-status.err{background:#FFEBEE;color:#C62828}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-save{background:var(--dark);color:var(--white);border:none;padding:10px 26px;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background 0.2s}
.btn-save:hover{background:var(--gold)}
.btn-save:disabled{opacity:0.6;cursor:not-allowed}
.btn-cancel-sm{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:9px 20px;border-radius:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px}
.admin-list{display:flex;flex-direction:column;gap:8px}
.admin-item{border:1px solid var(--border);border-radius:2px;padding:12px 14px;display:flex;align-items:center;gap:12px;background:var(--light)}
.admin-thumb{width:48px;height:48px;border-radius:2px;object-fit:cover;background:var(--border);flex-shrink:0}
.admin-thumb-ph{width:48px;height:48px;border-radius:2px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.admin-info{flex:1;min-width:0}
.admin-info strong{display:block;color:var(--text);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-info span{font-size:11px;color:var(--muted)}
.admin-actions{display:flex;gap:6px;flex-shrink:0}
.btn-edit{background:transparent;border:1px solid var(--border2);color:var(--gold);padding:5px 12px;border-radius:2px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.btn-edit:hover{background:var(--gold-pale)}
.btn-del{background:transparent;border:1px solid #FFCDD2;color:#C62828;padding:5px 12px;border-radius:2px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.btn-del:hover{background:#FFEBEE}
.no-items{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.cfg-group{margin-bottom:22px}
.cfg-title{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
@media(max-width:640px){
  .nav-top{padding:12px 4%;flex-wrap:wrap}.nav-search{order:3;max-width:100%;flex:1 1 100%}
  .hero{padding:40px 4%;flex-direction:column;gap:28px}.hero-left{flex-direction:row;gap:20px}
  .catalog-section{padding:32px 4%}.contact-bar{padding:40px 4%}
  .form-grid{grid-template-columns:1fr}.form-group.full{grid-column:1}
  .admin-panel{padding:20px 16px}.cat-menu{padding:0 4%}
  .products-grid.list-view .product-card{flex-direction:column}
  .products-grid.list-view .product-image-wrap{width:100%;aspect-ratio:16/9}
}
</style>
</head>
